[workspace]
resolver = "3"
members = ["crates/*", "plugins/*", "xtask"]
exclude = ["plugins/schemas"]
default-members = ["crates/thrustr"]

[workspace.dependencies]
# Local
domain = { path = "crates/domain" }
gpui-tokio = { path = "crates/gpui-tokio" }
paths = { path = "crates/paths" }
plugin-manager = { path = "crates/plugin-manager" }
sqlite-storage = { path = "crates/sqlite-storage" }

# External
anyhow = "1"
dashmap = "6"
extism = "1.13.0"
extism-pdk = "1.4.0"
gpui = "0.2.2"
semver = { version = "1", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1.48", features = ["full"] }
tokio-mpmc = "0.2"
toml = "0.9"
uuid = { version = "1.19", features = ["v4", "serde"] }

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = 3
strip = true
