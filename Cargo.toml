[workspace]
resolver = "3"
members = ["crates/*", "plugins/*", "xtask"]
exclude = ["plugins/schemas"]
default-members = ["crates/thrustr"]

[workspace.dependencies]
# Local
assets = { path = "crates/assets" }
config = { path = "crates/config" }
domain = { path = "crates/domain" }
gpui-tokio = { path = "crates/gpui-tokio" }
plugin-manager = { path = "crates/plugin-manager" }
ports = { path = "crates/ports" }
sqlite-storage = { path = "crates/sqlite-storage" }
theme-manager = { path = "crates/theme-manager" }
thrustr-plugin = { path = "crates/thrustr-plugin" }
ui = { path = "crates/ui" }

# External
anyhow = "1"
futures = "0.3"
gpui = "0.2.2"
semver = { version = "1", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
smol = "2"
tokio = { version = "1.48", features = ["full"] }
toml = "0.9"
xutex = "0.2"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = 3
strip = true
