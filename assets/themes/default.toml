[manifest]
id = "thrustr.dark"
name = "Thrustr Dark"
authors = ["Jorge Pardo"]
version = "1.0.0"
description = "The default dark theme for Thrustr."

[colors]
background = "#0A0A0A"
primary = "#FFFFFF"
secondary = "#646464"
surface = "#262626"
accent = "#8BF0FE"
border = "#323232"
error = "#CD3F3F"
warning = "#FDF85F"

sidebar_background = "#0A0A0A"
sidebar_primary = "#FFFFFF"
sidebar_secondary = "#646464"
sidebar_surface = "#262626"
sidebar_logo = "#B6B6B6"

card_background = "#252525"
card_surface = "#3A3A3A"
card_primary = "#FFFFFF"
card_secondary = "#646464"

[radius]
sm = "0.5rem"
lg = "1.5rem"
full = "999px"
