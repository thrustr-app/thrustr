name: "Bug Report"
description: Create a new ticket for a bug.
type: bug
title: "<title>"
body:
  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: Provide a clear and concise description of the bug.
      placeholder: Briefly describe what went wrong...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: "Reproduction Steps"
      description: Step-by-step instructions to reproduce the bug.
      value: |
        1. Go to '...'
        2. Click on '...'
        3. Observe the unexpected behavior
    validations:
      required: true

  - type: textarea
    id: expected-behaviour
    attributes:
      label: "Expected Behaviour"
      description: The exptected behaviour from the steps above.
      placeholder: "The application should..."
    validations:
      required: false

  - type: textarea
    id: actual-behaviour
    attributes:
      label: "Actual Behaviour"
      description: The actual behaviour from the steps above.
      placeholder: "The application did..."
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: "Operating System(s) Affected"
      description: Select all operating systems where this bug occurs.
      multiple: true
      options:
        - Windows
        - Linux
        - Mac
    validations:
      required: true
