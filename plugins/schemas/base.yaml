version: v1-draft

exports:
  initialize:
    description: |
      Used to initialize the plugin with necessary setup. Called when the app loads the plugin.

imports:
  get_plugin_data:
    description: |
      Retrieves plugin data from the host database.
    output:
      type: object
      nullable: true
      description: The plugin data object.
      contentType: application/json
  set_plugin_data:
    description: |
      Sets plugin data in the host database.
    input:
      type: object
      description: The plugin data object to set.
      contentType: application/json
    output:
      type: boolean
      description: True if the operation was successful.
      contentType: application/x-binary
