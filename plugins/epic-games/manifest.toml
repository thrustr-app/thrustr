[plugin]
id = "epic-games"
name = "Epic Games"
version = "0.0.1"
authors = ["Jorge Pardo"]
description = "Plugin to download and launch Epic Games Store games."

[[config.section]]
name = "General"

    [[config.section.field]]
    type = "text"
    id = "username"
    label = "Username"
    placeholder = "johndoe"

    [[config.section.field]]
    type = "text"
    id = "password"
    label = "Password"
    placeholder = "1234"

[[config.section]]
name = "Advanced Settings"

    [[config.section.field]]
    type = "text"
    id = "enable_debug"
    label = "Enable Debug Mode"

    [[config.section.field]]
    type = "text"
    id = "verbose_logging"
    label = "Verbose Logging"
