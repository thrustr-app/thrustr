[plugin]
id = "legacy-games"
name = "Legacy Games"
version = "0.0.1"
authors = ["Jorge Pardo"]
description = "Plugin to interact with Legacy Games."

[[auth.field]]
type = "text"
id = "username"
label = "Username"
placeholder = "johndoe"
